services:
  # ── Infrastructure ──
  postgres:
    image: postgres:16-alpine
    container_name: kg_postgres
    environment:
      POSTGRES_DB: kg_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgresql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kg_net

  neo4j:
    image: neo4j:5-community
    container_name: kg_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kg_net

  redis:
    image: redis:7-alpine
    container_name: kg_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - kg_net

  minio:
    image: minio/minio:latest
    container_name: kg_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kg_net

  # ── Application ──
  ai_service:
    build:
      context: .
      dockerfile: Dockerfile.ai_service
    container_name: kg_ai_service
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-pro}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: documents
      REDIS_URL: redis://redis:6379/1
      HF_ENDPOINT: https://hf-mirror.com
      EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      FASTEMBED_CACHE_PATH: /app/data/fastembed_cache
      FAISS_INDEX_PATH: /app/data/faiss_index
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ai_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kg_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kg_backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      PROJECT_NAME: 知识图谱平台
      DEBUG: "false"
      POSTGRES_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kg_platform
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: documents
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AI_SERVICE_URL: http://ai_service:8001/api/v1
      ALLOWED_ORIGINS: '["https://${DOMAIN}"]'
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai_service:
        condition: service_started
    restart: unless-stopped
    networks:
      - kg_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: kg_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kg_net

  # ── Reverse Proxy ──
  caddy:
    image: caddy:2-alpine
    container_name: kg_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - kg_net

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
  ai_data:
  caddy_data:
  caddy_config:

networks:
  kg_net:
    driver: bridge
