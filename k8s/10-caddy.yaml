# NodePort services for external Caddy access
# System-level Caddy at /etc/caddy/Caddyfile proxies to these ports.
# DO NOT deploy a Caddy container in K8s - it would conflict with system Caddy.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kg-platform
  labels:
    app: backend
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      name: http
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kg-platform
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
      name: http
  selector:
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: kg-platform
  labels:
    app: ai-service
spec:
  type: NodePort
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081
      name: http
  selector:
    app: ai-service
