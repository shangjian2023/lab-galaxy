# K8s deployment for KG platform - NO Caddy included
# System-level Caddy at /etc/caddy/Caddyfile will proxy to NodePort services
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kg-platform
  labels:
    app: backend
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      name: http
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kg-platform
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
      name: http
  selector:
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: kg-platform
  labels:
    app: ai-service
spec:
  type: NodePort
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081
      name: http
  selector:
    app: ai-service
---
# K8s Caddy with hostNetwork - binds directly to ports 80/443 on host
apiVersion: v1
kind: Service
metadata:
  name: caddy-k8s
  namespace: kg-platform
  labels:
    app: caddy-k8s
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 443
      targetPort: 443
      name: https
  selector:
    app: caddy-k8s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile-k8s
  namespace: kg-platform
data:
  Caddyfile: |
    {
        admin off
        http_port 80
        https_port 443
    }

    api.mazhuoran.cloud {
        reverse_proxy 127.0.0.1:30080
    }

    graph.mazhuoran.cloud {
        @websocket {
            header Connection *Upgrade*
            header Upgrade websocket
        }
        reverse_proxy @websocket 127.0.0.1:30080 {
            header_up Connection {>Connection}
            header_up Upgrade {>Upgrade}
        }

        handle /api/* {
            reverse_proxy 127.0.0.1:30080
        }
        handle /docs* {
            reverse_proxy 127.0.0.1:30080
        }
        handle /openapi.json* {
            reverse_proxy 127.0.0.1:30080
        }
        handle /health* {
            reverse_proxy 127.0.0.1:30080
        }
        reverse_proxy 127.0.0.1:30001
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-k8s
  namespace: kg-platform
  labels:
    app: caddy-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy-k8s
  template:
    metadata:
      labels:
        app: caddy-k8s
    spec:
      terminationGracePeriodSeconds: 10
      hostNetwork: true
      containers:
        - name: caddy
          image: caddy:2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              hostPort: 80
              name: http
            - containerPort: 443
              hostPort: 443
              name: https
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: caddyfile
          configMap:
            name: caddyfile-k8s
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
