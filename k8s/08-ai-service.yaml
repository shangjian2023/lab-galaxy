apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: kg-platform
  labels:
    app: ai-service
spec:
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: ai-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: kg-platform
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z neo4j 7687; do echo waiting for neo4j; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: ai-service
          image: kg-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: REDIS_URL
              value: "redis://redis:6379/1"
            - name: FASTEMBED_CACHE_PATH
              value: "/app/data/fastembed_cache"
          envFrom:
            - secretRef:
                name: kg-secrets
            - secretRef:
                name: kg-db-creds
            - configMapRef:
                name: kg-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: ai-data
              mountPath: /app/data
      volumes:
        - name: ai-data
          persistentVolumeClaim:
            claimName: ai-service-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-service-data
  namespace: kg-platform
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
