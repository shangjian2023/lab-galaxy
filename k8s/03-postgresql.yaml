  002_forum.sql: |
    CREATE TABLE forum_posts (
        id          UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        title       VARCHAR(255) NOT NULL,
        content     TEXT NOT NULL,
        author_id   UUID NOT NULL REFERENCES users(id),
        views       INTEGER DEFAULT 0,
        likes       INTEGER DEFAULT 0,
        created_at  TIMESTAMPTZ DEFAULT NOW(),
        updated_at  TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE TABLE forum_comments (
        id          UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        post_id     UUID NOT NULL REFERENCES forum_posts(id),
        user_id     UUID NOT NULL REFERENCES users(id),
        content     TEXT NOT NULL,
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX idx_forum_posts_author ON forum_posts(author_id);
    CREATE INDEX idx_forum_posts_created ON forum_posts(created_at);
    CREATE INDEX idx_forum_comments_post ON forum_comments(post_id);
  003_usage.sql: |
    CREATE TABLE usage_logs (
        id          UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        user_id     UUID REFERENCES users(id),
        action      VARCHAR(50) NOT NULL,
        details     TEXT,
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX idx_usage_logs_user ON usage_logs(user_id);
    CREATE INDEX idx_usage_logs_action ON usage_logs(action);
